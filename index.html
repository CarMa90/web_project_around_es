<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <meta content="ie=edge" http-equiv="X-UA-Compatible" />
    <title>Around The U.S.</title>
    <link href="./pages/index.css" rel="stylesheet" />
  </head>
  <body class="page">
    <div class="page__content">
      <header class="header page__section">
        <img
          alt="Logotipo Around The U.S."
          class="logo header__logo"
          src="./images/logo.svg"
        />
      </header>
      <main class="content">
        <section class="profile page__section">
          <div class="profile__image-container">
            <img class="profile__image" src="" alt="" />
            <div class="profile__image-overlay">
              <img src="./images/edit-icon.svg" alt="Edit Icon" />
            </div>
          </div>
          <div class="profile__info">
            <h1 class="profile__title"></h1>
            <button
              aria-label="Editar perfil"
              class="profile__edit-button"
              type="button"
            ></button>
            <p class="profile__description"></p>
          </div>
          <button
            aria-label="Agregar tarjeta"
            class="profile__add-button"
            type="button"
          ></button>
        </section>
        <section class="cards page__section">
          <ul class="cards__list">
            <template id="card-template">
              <li class="card">
                <img class="card__image" />
                <button class="card__delete-button"></button>
                <div class="card__description">
                  <h2 class="card__title"></h2>
                  <button class="card__like-button"></button>
                </div>
              </li>
            </template>
          </ul>
        </section>
      </main>
      <footer class="footer page__section">
        <p class="footer__copyright">© 2025 Around The U.S.</p>
      </footer>
      <div class="popup" id="profile-image-popup">
        <div class="popup__content">
          <button
            aria-label="Cerrar ventana emergente"
            class="popup__close"
            type="button"
          ></button>
          <h3 class="popup__title">Cambiar foto de perfil</h3>
          <form
            class="popup__form"
            id="profile-image-form"
            novalidate
            autocomplete="off"
          >
            <input
              class="popup__input popup__input_type_url"
              name="profile-image"
              placeholder="Enlace a la foto de perfil"
              type="url"
              required
            />
            <span
              class="popup__error-message profile-image-error-message"
            ></span>
            <button class="button popup__button" type="submit">Guardar</button>
          </form>
        </div>
      </div>
      <div class="popup" id="confirmation-popup">
        <div class="popup__content">
          <h3 class="popup__title">¿Estás seguro/a?</h3>
          <form
            class="popup__form"
            id="confirmation-form"
            novalidate
            autocomplete="off"
          >
            <input
              class="popup__input popup__input_type_id"
              name="card-id"
              type="hidden"
            />
            <span class="popup__error-message card-id-error-message"></span>
            <button class="button popup__button" type="submit">Sí</button>
          </form>
        </div>
      </div>
      <div class="popup" id="edit-popup">
        <div class="popup__content">
          <button
            aria-label="Cerrar ventana emergente"
            class="popup__close"
            type="button"
          ></button>
          <h3 class="popup__title">Editar perfil</h3>
          <form
            class="popup__form"
            id="edit-profile-form"
            novalidate
            autocomplete="off"
          >
            <input
              class="popup__input popup__input_type_name"
              name="name"
              placeholder="Nombre"
              type="text"
              minlength="2"
              maxlength="40"
              required
            />
            <span class="popup__error-message name-error-message"></span>
            <input
              class="popup__input popup__input_type_description"
              name="description"
              placeholder="Acerca de mí"
              type="text"
              minlength="2"
              maxlength="200"
              required
            />
            <span class="popup__error-message description-error-message"></span>
            <button class="button popup__button" type="submit">Guardar</button>
          </form>
        </div>
      </div>
      <div class="popup" id="new-card-popup">
        <div class="popup__content">
          <button
            aria-label="Cerrar ventana emergente"
            class="popup__close"
            type="button"
          ></button>
          <h3 class="popup__title">Nuevo lugar</h3>
          <form
            class="popup__form"
            id="new-card-form"
            novalidate
            autocomplete="off"
          >
            <input
              class="popup__input popup__input_type_card-name"
              name="place-name"
              placeholder="Título"
              type="text"
              minlength="2"
              maxlength="30"
              required
            />
            <span class="popup__error-message place-name-error-message"></span>
            <input
              class="popup__input popup__input_type_url"
              name="link"
              placeholder="Enlace a la imagen"
              required
              type="url"
            />
            <span class="popup__error-message link-error-message"></span>
            <button class="button popup__button" type="submit">Crear</button>
          </form>
        </div>
      </div>
      <div class="popup" id="image-popup">
        <div class="popup__content popup__content_content_image">
          <button
            aria-label="Cerrar ventana emergente"
            class="popup__close"
            type="button"
          ></button>
          <img alt="" class="popup__image" src="#" />
          <p class="popup__caption"></p>
        </div>
      </div>
    </div>
    <script src="./scripts/pages/index.js" type="module"></script>
  </body>
</html>
